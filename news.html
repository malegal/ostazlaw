    <script>
        (function() {
            'use strict';

            // ===== كل الكود من article.html مع تغيير واحد فقط: مسار baseUrl =====

            // ... (استيراد دوال header, mobile menu, reveal, etc.)

            async function fetchArticle() {
                const slug = new URLSearchParams(window.location.search).get('slug');
                if (!slug) {
                    document.getElementById('loader').innerHTML = '<p class="text-red-500" style="color:#dc2626;">لم يتم تحديد الخبر.</p>';
                    return;
                }

                const owner = 'malegal';
                const repo = 'mahmoud-legal';
                // ⬇️ التغيير الجوهري: المسار أصبح news بدلاً من articles
                const baseUrl = `https://raw.githubusercontent.com/${owner}/${repo}/main/blog/news`;

                try {
                    const response = await fetch(`${baseUrl}/${slug}.md`);
                    if (!response.ok) throw new Error('الخبر غير موجود');

                    let md = await response.text();

                    // استخراج Front Matter (نفس المنطق)
                    let title = '';
                    let image = '';
                    let description = '';
                    const yamlMatch = md.match(/^---\s*([\s\S]*?)\s*---/);
                    if (yamlMatch) {
                        const frontMatter = yamlMatch[1];
                        const titleMatch = frontMatter.match(/title:\s*(.*)/i);
                        if (titleMatch) title = titleMatch[1].replace(/['"]/g, '').trim();
                        const imageMatch = frontMatter.match(/image:\s*(.*)/i);
                        if (imageMatch) image = imageMatch[1].replace(/['"]/g, '').trim();
                        const descMatch = frontMatter.match(/description:\s*(.*)/i);
                        if (descMatch) description = descMatch[1].replace(/['"]/g, '').trim();
                        md = md.replace(/^---\s*[\s\S]*?\s*---/, '');
                    }

                    if (!title) title = decodeURIComponent(slug.replace(/-/g, ' '));
                    if (!description) description = 'خبر وإنجاز جديد من مؤسسة الأستاذ محمود عبد الحميد.';

                    // تحديث الميتا تاج (SEO) – نفس المنطق
                    document.title = title + ' | أخبار المؤسسة';
                    document.querySelector('meta[name="description"]').setAttribute('content', description);
                    document.querySelector('link[rel="canonical"]').setAttribute('href',
                        `https://ostazlaw.vercel.app/news.html?slug=${slug}`);
                    document.querySelector('meta[property="og:title"]').setAttribute('content', title);
                    document.querySelector('meta[property="og:description"]').setAttribute('content', description);
                    document.querySelector('meta[property="og:url"]').setAttribute('content',
                        `https://ostazlaw.vercel.app/news.html?slug=${slug}`);
                    if (image) {
                        document.querySelector('meta[property="og:image"]').setAttribute('content', image);
                    }

                    // تحديث JSON-LD (نفس المنطق)
                    // ...

                    // عرض الخبر
                    document.getElementById('article-title').textContent = title;

                    const imageContainer = document.getElementById('article-image');
                    if (image) {
                        imageContainer.innerHTML =
                            `<img src="${image}" alt="${title}" loading="lazy" onerror="this.style.display='none'" />`;
                        imageContainer.style.display = 'block';
                    } else {
                        imageContainer.style.display = 'none';
                    }

                    const rawHtml = marked.parse(md);
                    const sanitizedHtml = DOMPurify.sanitize(rawHtml, {
                        ALLOWED_TAGS: [
                            'p', 'h1', 'h2', 'h3', 'h4', 'h5', 'h6',
                            'ul', 'ol', 'li', 'blockquote', 'table', 'thead', 'tbody', 'tr', 'th', 'td',
                            'strong', 'em', 'u', 'br', 'hr', 'a', 'img', 'code', 'pre', 'span', 'div'
                        ],
                        ALLOWED_ATTR: ['href', 'target', 'src', 'alt', 'title', 'class', 'style']
                    });
                    document.getElementById('article-body').innerHTML = sanitizedHtml;

                    const words = md.split(/\s+/).length;
                    document.getElementById('read-time').textContent = Math.ceil(words / 200) || 1;

                    // تحديث روابط المشاركة (نفس المنطق)
                    const url = encodeURIComponent(`https://ostazlaw.vercel.app/news.html?slug=${slug}`);
                    const encodedTitle = encodeURIComponent(title);
                    document.getElementById('share-wa').href = `https://wa.me/?text=${encodedTitle}%20${url}`;
                    document.getElementById('share-tg').href = `https://t.me/share/url?url=${url}&text=${encodedTitle}`;
                    document.getElementById('share-fb').href = `https://www.facebook.com/sharer/sharer.php?u=${url}`;
                    document.getElementById('share-in').href =
                        `https://www.linkedin.com/shareArticle?mini=true&url=${url}&title=${encodedTitle}`;
                    document.getElementById('share-x').href = `https://x.com/intent/tweet?url=${url}&text=${encodedTitle}`;

                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('article-container').style.display = 'block';

                } catch (error) {
                    console.error('Error loading news:', error);
                    document.getElementById('loader').innerHTML =
                        '<p class="text-red-500" style="color:#dc2626;">نعتذر، فشل تحميل الخبر. يرجى المحاولة لاحقاً.</p>';
                }
            }

            fetchArticle();

        })();
    </script>
